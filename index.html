<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Welcome to Khotwat Store. I am a Web Developer specialized in crafting seamless digital experiences.">
    <title>متجر خُطوات | Khotwat Store</title>
    <style>
        /* CSS Style */
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f4f4f4; text-align: center; overflow-x: hidden; }
        .intro-screen { height: 100vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1552346154-21d32810aba3?w=1000'); background-size: cover; display: flex; justify-content: center; align-items: center; color: white; position: fixed; width: 100%; z-index: 1000; transition: 0.5s; }
        .intro-content button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; border: none; background: #e67e22; color: white; }
        header { background: #222; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav button { background: #444; border: none; color: white; padding: 8px 15px; cursor: pointer; margin: 0 5px; border-radius: 5px; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 40%; border-radius: 15px; text-align: right; }
        footer { background: #222; color: white; padding: 40px; margin-top: 50px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="intro-page" class="intro-screen">
        <div class="intro-content">
            <h1>👟 مرحباً بك في متجر خُطوات</h1>
            <p>Where Style Meets Comfort</p>
            <button onclick="startShopping()">دخول المتجر | Enter Store</button>
        </div>
    </div>

    <div id="main-store" style="visibility: hidden;">
        <header>
            <h2>👟 خُطوات</h2>
            <nav>
                <button onclick="displayProducts('all')">الكل</button>
                <button onclick="displayProducts('men')">رجالي</button>
                <button onclick="displayProducts('women')">حريمي</button>
            </nav>
            <div style="cursor:pointer" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</div>
        </header>

        <section class="products" id="product-list"></section>

        <div id="cart-modal" class="modal">
            <div class="modal-content">
                <h2>🛒 ملخص الطلب</h2>
                <div id="cart-items-list"></div>
                <hr>
                <h3>الإجمالي: <span id="total-price">0</span> ريال</h3>
                <input type="text" id="u-name" placeholder="الاسم">
                <input type="text" id="u-phone" placeholder="رقم الهاتف">
                <button style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:5px;" onclick="complete()">تأكيد الطلب</button>
                <button onclick="toggleCart()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">إغلاق</button>
            </div>
        </div>

        <footer>
            <div style="display:flex; justify-content:space-around">
                <div><h3>About Us</h3><p>أفضل متجر أحذية في المنطقة.</p></div>
                <div><h3>Contact</h3><p>Email: info@khotwat.com</p></div>
            </div>
        </footer>
    </div>

    <script>
        const products = [
            { id: 1, name: "نايت رانر", price: 250, category: "men", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff" },
            { id: 2, name: "كعب سهرة", price: 400, category: "women", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2" },
            { id: 3, name: "حذاء مشي", price: 180, category: "men", img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86" },
            { id: 4, name: "صندل صيفي", price: 150, category: "women", img: "https://images.unsplash.com/photo-1562273103-91d446733189" },
            { id: 5, name: "رسمي بني", price: 450, category: "men", img: "https://images.unsplash.com/photo-1531310197839-ccf54634509e" },
            { id: 6, name: "رياضي أبيض", price: 320, category: "women", img: "https://images.unsplash.com/photo-1512374382149-4332c6c021f1" },
            { id: 7, name: "بوت جبلي", price: 500, category: "men", img: "https://images.unsplash.com/photo-1541597471942-b924ce99697f" }
        ];

        let cart = [];

        function startShopping() {
            document.getElementById('intro-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-page').style.display = 'none';
                document.getElementById('main-store').style.visibility = 'visible';
                displayProducts('all');
            }, 500);
        }

        function displayProducts(cat) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            filtered.forEach(p => {
                list.innerHTML += `<div class="product-card"><img src="${p.img}"><h3>${p.name}</h3><p>${p.price} ريال</p><button onclick="add(${p.id})">إضافة للسلة 🛒</button></div>`;
            });
        }

        function add(id) {
            cart.push(products.find(p => p.id === id));
            document.getElementById('cart-count').innerText = cart.length;
            alert("تمت الإضافة!");
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            let total = 0;
            const itemsList = document.getElementById('cart-items-list');
            itemsList.innerHTML = cart.map(i => { total += i.price; return `<p>${i.name} - ${i.price} ريال</p>`; }).join('');
            document.getElementById('total-price').innerText = total;
        }

        function complete() {
            if(document.getElementById('u-name').value && cart.length > 0) {
                alert("تم استلام طلبك! شكراً لثقتك في خُطوات.");
                cart = [];
                location.reload();
            }
        }
    </script>
</body>
</html>
