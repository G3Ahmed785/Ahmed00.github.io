<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر خُطوات | الدفع الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --dark: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--gray); }

        /* --- Login Section --- */
        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- Header --- */
        header { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-btns button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-left: 5px; }
        .nav-btns button.active { background: var(--primary); }

        /* --- Grid --- */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding: 30px 5%; }
        .shoe-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; text-align: center; }
        .shoe-card:hover { transform: translateY(-5px); }
        .shoe-card img { width: 100%; height: 200px; object-fit: cover; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .add-btn { width: 100%; padding: 10px; background: var(--dark); color: white; border: none; cursor: pointer; }

        /* --- Checkout & Payment Modals --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 400px; max-width: 90%; }
        
        .payment-form input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .pay-now-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .visa-icons { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>👟 تسجيل الدخول</h2>
            <input type="text" id="uInp" placeholder="اسم المستخدم">
            <input type="password" id="pInp" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div style="font-size: 1.5rem; font-weight: bold;">خُطوات</div>
            <div class="nav-btns">
                <button onclick="render('all')" id="all-btn" class="active">الكل</button>
                <button onclick="render('men')" id="men-btn">رجالي</button>
                <button onclick="render('women')" id="women-btn">نسائي</button>
            </div>
            <div onclick="showCart()" style="cursor:pointer">🛒 السلة (<span id="count">0</span>)</div>
        </header>

        <div class="products-grid" id="grid"></div>

        <div id="cart-modal" class="modal">
            <div class="modal-content">
                <h2>🛒 سلة المشتريات</h2>
                <div id="cart-items-list"></div>
                <hr>
                <h3>الإجمالي: <span id="total-val">0</span> ريال</h3>
                <button class="pay-now-btn" style="background: var(--primary);" onclick="goToPayment()">الانتقال للدفع</button>
                <button onclick="closeModals()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">إغلاق</button>
            </div>
        </div>

        <div id="payment-modal" class="modal">
            <div class="modal-content">
                <h2 style="text-align:center">💳 الدفع الآمن</h2>
                <div class="visa-icons">🏧 💳 🔏</div>
                <div class="payment-form">
                    <label>الاسم على البطاقة</label>
                    <input type="text" placeholder="John Doe">
                    <label>رقم البطاقة</label>
                    <input type="text" placeholder="**** **** **** 1234">
                    <div style="display:flex; gap:10px;">
                        <input type="text" placeholder="MM/YY">
                        <input type="password" placeholder="CVV">
                    </div>
                    <button class="pay-now-btn" onclick="finish()">دفع الآن (<span id="final-total"></span> ريال)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "نايك رانينج بلس", price: 320, cat: "men", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff" },
            { id: 2, name: "حذاء كلاسيك بني", price: 450, cat: "men", img: "https://images.unsplash.com/photo-1531310197839-ccf54634509e" },
            { id: 3, name: "كعب سهرة وردي", price: 290, cat: "women", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2" },
            { id: 4, name: "سنيكرز يومي", price: 180, cat: "men", img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86" },
            { id: 5, name: "حذاء مشي مريح", price: 220, cat: "women", img: "https://images.unsplash.com/photo-1512374382149-4332c6c021f1" },
            { id: 6, name: "بوت جبلي", price: 550, cat: "men", img: "https://images.unsplash.com/photo-1541597471942-b924ce99697f" }
        ];

        let cart = [];

        function login() {
            if(document.getElementById('uInp').value === 'admin' && document.getElementById('pInp').value === '12345') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                render('all');
            } else { alert("خطأ!"); }
        }

        function render(c) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
            document.getElementById(c + '-btn').classList.add('active');

            const filtered = c === 'all' ? products : products.filter(p => p.cat === c);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="shoe-card">
                        <img src="${p.img}?w=400">
                        <div style="padding:15px">
                            <h3>${p.name}</h3>
                            <p class="price">${p.price} ريال</p>
                        </div>
                        <button class="add-btn" onclick="addToCart(${p.id})">إضافة للسلة 🛒</button>
                    </div>`;
            });
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            document.getElementById('count').innerText = cart.length;
        }

        function showCart() {
            document.getElementById('cart-modal').style.display = 'flex';
            let total = 0;
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map(i => { total += i.price; return `<p>${i.name} - ${i.price} ريال</p>`; }).join('');
            document.getElementById('total-val').innerText = total;
            document.getElementById('final-total').innerText = total;
        }

        function goToPayment() {
            if(cart.length === 0) return alert("السلة فارغة!");
            document.getElementById('cart-modal').style.display = 'none';
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function finish() {
            alert("💳 جاري معالجة الدفع...\nتمت العملية بنجاح! شكراً لشرائك من خُطوات.");
            cart = [];
            document.getElementById('count').innerText = 0;
            closeModals();
        }
    </script>
</body>
</html>
